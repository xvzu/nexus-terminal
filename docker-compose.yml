services:
  frontend:
    image: xvzu/nexus-terminal-frontend:latest
    container_name: nexus-terminal-frontend
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "18111:80"
    depends_on:
      - backend
      - remote-gateway
    networks:
      - nexus-terminal-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  backend:
    image: xvzu/nexus-terminal-backend:latest
    container_name: nexus-terminal-backend
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ./data:/app/data
    networks:
      - nexus-terminal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  remote-gateway:
    image: xvzu/nexus-terminal-remote-gateway:latest
    container_name: nexus-terminal-remote-gateway
    build:
      context: .
      dockerfile: packages/remote-gateway/Dockerfile
    environment:
      GUACD_HOST: guacd
      GUACD_PORT: 4822
      REMOTE_GATEWAY_API_PORT: 9090
      REMOTE_GATEWAY_WS_PORT: 8080
      FRONTEND_URL: http://frontend
      MAIN_BACKEND_URL: http://backend:3001
      NODE_ENV: production
    networks:
      - nexus-terminal-network
    restart: unless-stopped
    depends_on:
      guacd:
        condition: service_healthy
      backend:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  guacd:
    image: guacamole/guacd:latest
    container_name: nexus-terminal-guacd
    networks:
      - nexus-terminal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "echo", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

networks:
  nexus-terminal-network:
    driver: bridge
    name: nexus-terminal-network
    enable_ipv6: false
